---
- name: Load global input defaults
  hosts: localhost
  gather_facts: false
  tags:
    - always
  tasks:
    - ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../common/vars/global_input.yml"

- name: Include input project directory
  when: not project_dir_status | default(false) | bool
  ansible.builtin.import_playbook: ../utils/include_input_dir.yml
  vars:
    openchami_vars_support: true
    openchami_cloud_init_support: true
    omnia_metadata_support: true
  tags:
    - always

- name: Create oim group and provision group
  ansible.builtin.import_playbook: ../utils/create_container_group.yml
  vars:
    oim_group: true
  tags:
    - always

- name: Generate functional groups configuration
  ansible.builtin.import_playbook: ../utils/generate_functional_groups.yml
  tags:
    - always

- name: Derive workload stack presence from functional groups
  hosts: localhost
  gather_facts: false
  tags:
    - always
  tasks:
    - name: Collect functional group names
      ansible.builtin.set_fact:
        functional_group_names: "{{ functional_groups | default([]) | map(attribute='name') | list }}"

    - name: Set workload presence flags
      ansible.builtin.set_fact:
        service_k8s_groups_present: "{{ (functional_group_names | default([])) | select('match', '^service_kube_(control_plane(_first)?|node)_') | list | length > 0 }}"
        slurm_groups_present: "{{ (functional_group_names | default([])) | select('match', '^slurm_(control_node|node|login_node|login_compiler_node)_') | list | length > 0 }}"

- name: Set_fact for fetch omnia config credentials
  hosts: localhost
  connection: local
  tags:
    - never
  tasks:
    - name: Set dynamic run tags including 'provision'
      when: not config_file_status | default(false) | bool
      ansible.builtin.set_fact:
        omnia_run_tags: >-
          {{
            (
              ansible_run_tags | default([]) +
              ['provision', 'slurm', 'slurm_custom', 'security', 'csi_driver_powerscale', 'ldms', 'telemetry'] +
              (
                ['service_k8s']
                if ( 'service_k8s' in (
                    lookup('file', hostvars['localhost']['input_project_dir'] ~ '/software_config.json')
                    | from_json).softwares | map(attribute='name') | list )
                else []
              )
            ) | unique
          }}
        cacheable: true

- name: Invoke validate_config.yml to perform L1 and L2 validations
  when: not config_file_status | default(false) | bool
  tags:
    - always
  ansible.builtin.import_playbook: ../input_validation/validate_config.yml

- name: Invoke get_config_credentials.yml
  when: not config_file_status | default(false) | bool
  tags:
    - always
  ansible.builtin.import_playbook: ../utils/credential_utility/get_config_credentials.yml

- name: Validate discovery parameters
  hosts: localhost
  connection: local
  tags:
    - openchami_commands
    - cloud_init
  tasks:
    - name: Load discovery validation vars
      ansible.builtin.include_vars: "{{ playbook_dir }}/roles/discovery_validations/vars/main.yml"

    - name: Set_fact for omnia_config_credentials.yml variables
      ansible.builtin.set_fact:
        provision_password: "{{ hostvars['localhost']['provision_password'] }}"
        bmc_username: "{{ hostvars['localhost']['bmc_username'] }}"
        bmc_password: "{{ hostvars['localhost']['bmc_password'] }}"
      no_log: true
      when:
        - hostvars['localhost']['provision_password'] is defined
        - hostvars['localhost']['bmc_username'] is defined
        - hostvars['localhost']['bmc_password'] is defined

    - name: Include discovery inputs
      ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/discovery_validations/tasks/include_inputs.yml"
      with_items: "{{ discovery_inputs }}"

    - name: Include software config
      ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/discovery_validations/tasks/include_software_config.yml"

    - name: Check if discovery mechanism is mapping
      ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/discovery_validations/tasks/validate_mapping_mechanism.yml"

    - name: Validate mapping file
      ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/discovery_validations/tasks/validate_mapping_file.yml"
      when: mapping_file_status

    - name: Update hosts file
      ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/discovery_validations/tasks/update_hosts.yml"

- name: Validate OIM timezone
  hosts: oim
  connection: ssh
  tags:
    - openchami_commands
    - cloud_init
  tasks:
    - name: Validate OIM timezone has not changed
      ansible.builtin.include_role:
        name: discovery_validations
        tasks_from: validate_oim_timezone.yml

- name: Build cluster host lists from PXE mapping
  hosts: localhost
  connection: local
  tags:
    - openchami_commands
    - cloud_init
  tasks:
    - name: Load discovery validation vars
      ansible.builtin.include_vars: "{{ playbook_dir }}/roles/discovery_validations/vars/main.yml"

    - name: Set_fact for omnia_config_credentials.yml variables
      ansible.builtin.set_fact:
        provision_password: "{{ hostvars['localhost']['provision_password'] }}"
        bmc_username: "{{ hostvars['localhost']['bmc_username'] }}"
        bmc_password: "{{ hostvars['localhost']['bmc_password'] }}"
      no_log: true
      when:
        - hostvars['localhost']['provision_password'] is defined
        - hostvars['localhost']['bmc_username'] is defined
        - hostvars['localhost']['bmc_password'] is defined

    - name: Include discovery inputs
      ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/discovery_validations/tasks/include_inputs.yml"
      with_items: "{{ discovery_inputs }}"

    - name: Include software config
      ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/discovery_validations/tasks/include_software_config.yml"

    - name: Check if discovery mechanism is mapping
      ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/discovery_validations/tasks/validate_mapping_mechanism.yml"

    - name: Validate mapping file
      ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/discovery_validations/tasks/validate_mapping_file.yml"
      when: mapping_file_status

    - name: Update hosts file
      ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/discovery_validations/tasks/update_hosts.yml"

- name: Configure OIM SSH from cluster host lists
  hosts: oim
  connection: ssh
  tags: never
  roles:
    - discovery_validations

- name: Validate discovery parameters
  hosts: oim
  connection: ssh
  tags: never
  roles:
    - discovery_validations

- name: Validate discovery parameters
  hosts: oim
  connection: ssh
  tags: never
  tasks:
    - name: Image validation
      ansible.builtin.include_role:
        name: discovery_validations
        tasks_from: validate_image.yml
      with_items: "{{ hostvars['localhost']['functional_groups'] | map(attribute='name') | list }}"

- name: Openchami cluster authentication
  hosts: oim
  connection: ssh
  tags:
    - openchami_commands
    - cloud_init
  tasks:
    - name: Openchami cluster authentication
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../common/tasks/common/openchami_auth.yml"
      vars:
        oim_node_name: "{{ hostvars['localhost']['oim_node_name'] }}"

- name: OpenCHAMI Commands Execution
  hosts: oim
  connection: ssh
  tags:
    - openchami_commands
  pre_tasks:
    - name: Prepare OpenChami discovery artifacts
      ansible.builtin.include_role:
        name: configure_ochami
        tasks_from: discover_mapping_nodes.yml
    - name: Run OpenChami discovery commands
      ansible.builtin.include_role:
        name: openchami_commands
        tasks_from: discover_mapping_nodes_commands.yml
  tasks:
    - name: Run OpenChami commands
      ansible.builtin.include_role:
        name: openchami_commands

    - name: Create and manage SMD groups
      ansible.builtin.include_role:
        name: configure_ochami
        tasks_from: create_groups.yml
      loop: "{{ hostvars['localhost']['functional_groups'] | map(attribute='name') | list }}"
      loop_control:
        loop_var: item

    - name: Apply SMD group commands
      ansible.builtin.include_role:
        name: openchami_commands
        tasks_from: create_groups_commands.yml
      loop: "{{ hostvars['localhost']['functional_groups'] | map(attribute='name') | list }}"
      loop_control:
        loop_var: item

- name: Cloud-init Configuration
  hosts: oim
  connection: ssh
  tags:
    - cloud_init
  tasks:
    - name: Configure cloud-init
      ansible.builtin.include_role:
        name: openchami_cloud_init

    - name: Create common SMD groups
      ansible.builtin.include_role:
        name: configure_ochami
        tasks_from: create_groups_common.yml
      loop: "{{ common_cloud_init_groups }}"
      loop_control:
        loop_var: item

    - name: Configure BSS boot parameters
      ansible.builtin.include_role:
        name: configure_ochami
        tasks_from: configure_bss_cloud_init.yml

- name: Input Project Configuration
  hosts: oim
  connection: ssh
  tags:
    - input_project
  tasks:
    - name: Load input project data
      ansible.builtin.include_role:
        name: openchami_input_project

- name: Configure node roles
  hosts: oim
  connection: ssh
  roles:
    - role: nfs_client
      tags: nfs_client
    - role: k8s_config
      tags: k8s_config
      when:
        - hostvars[inventory_hostname]['service_k8s_support'] | default(true) | bool
    - role: slurm_config
      tags: slurm_config
      when:
        - hostvars[inventory_hostname]['slurm_support'] | default(true) | bool
    - role: openldap
      tags: openldap
    - role: telemetry
      tags: telemetry

- name: Discovery completion
  hosts: oim
  connection: ssh
  tags:
    - openchami_commands
    - cloud_init
  tasks:
    - name: Discovery completion
      ansible.builtin.include_role:
        name: configure_ochami
        tasks_from: discovery_completion.yml
