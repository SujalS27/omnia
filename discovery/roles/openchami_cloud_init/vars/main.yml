---

# OpenChami Cloud-Init Global Variables
# Centralized cloud-init paths, templates, and configurations for discovery and provisioning

# Input Project Directory
input_project_dir: "{{ hostvars['localhost']['input_project_dir'] }}"

# Software Config File Path
software_config_file: "{{ hostvars['localhost']['input_project_dir'] }}/software_config.json"

# Local Repo Config Path
local_repo_config_path: "{{ hostvars['localhost']['input_project_dir'] }}/local_repo_config.yml"

# Cloud-Init Directories
ci_defaults_dest: "{{ cloud_init_dir }}/ci-defaults.yaml"
ci_group_common_dest: "{{ cloud_init_dir }}/ci-group-common.yaml"

# Cloud-Init Templates (shared across discovery)
ci_defaults_template: "{{ playbook_dir }}/roles/openchami_cloud_init/templates/ci-defaults.yaml.j2"
ci_group_common_template: "{{ playbook_dir }}/roles/openchami_cloud_init/templates/ci-group-common.yaml.j2"

# Cloud-Init Common Groups (ssh, chrony)
common_cloud_init_groups:
  - ssh
  - chrony

# Cloud-Init Boot Parameters
bss_params_cloud_init: 'ds=nocloud;s=http://{{ cluster_boot_ip }}:8081/cloud-init/'
bss_params_opts: 'ip=dhcp rd.live.image rd.live.ram rd.neednet=1 rd.driver.blacklist=ccp,edac_core,power_meter,ahci,megaraid_sas modprobe.blacklist=ccp,edac_core,power_meter,ahci,megaraid_sas libata.force=1:disable,2:disable,3:disable,4:disable rd.luks=0 rd.md=0 rd.dm=0 console=tty0 console=ttyS0,115200 selinux=0 apparmor=0 ip6=off cloud-init=enabled'

# Cloud-Init Error Messages
ci_group_load_fail_msg: |
  "Template loading failed. Ensure the template exists in the specified path and is compatible with the defined functional groups."

# Cloud-Init SSH Configuration
ssh_key_path: /root/.ssh/oim_rsa.pub
slurm_control_ssh_patterns: []
slurm_node_ssh_patterns: []
k8s_control_ssh_patterns: "{{ hostvars['localhost']['k8s_ssh_patterns'] | default('*') }}"

# Cloud-Init Container Registry Configuration
pulp_mirror: "{{ hostvars['localhost']['admin_nic_ip'] | default('localhost') }}:2225"
offline_pip_module_path: "{{ hostvars['localhost']['offline_pip_module_path'] | default('') }}"

# Cloud-Init Network Configuration (inherited from discovery_validations)
admin_nic_ip: "{{ hostvars['localhost']['admin_nic_ip'] | default('') }}"
admin_nic: "{{ hostvars['localhost']['admin_nic'] | default('') }}"
admin_netmask_bits: "{{ hostvars['localhost']['admin_netmask_bits'] | default('') }}"
ib_network_subnet: "{{ hostvars['localhost']['ib_network_subnet'] | default('') }}"
dns: "{{ hostvars['localhost']['dns'] | default('') }}"

# Cloud-Init NFS Paths (set by k8s_config role)
k8s_client_mount_path: "{{ k8s_client_mount_path | default('') }}"
k8s_nfs_server_ip: "{{ k8s_nfs_server_ip | default('') }}"
k8s_server_share_path: "{{ k8s_server_share_path | default('') }}"
k8s_crio_storage_size: "{{ k8s_crio_storage_size | default('') }}"
client_mount_path: "/mnt/ldms"

# Cloud-Init NFS Paths for Slurm Nodes
cloud_init_nfs_path: "{{ hostvars['localhost']['slurm_nfs_server'] | default('', true) }}:{{ hostvars['localhost']['slurm_nfs_path'] | default('/mnt/share/omnia') }}"
cloud_init_slurm_nfs_path: "{{ hostvars['localhost']['slurm_nfs_server'] | default('', true) }}:{{ hostvars['localhost']['slurm_nfs_path'] | default('/mnt/share/omnia') }}"
cloud_init_nfs_path_openldap: "{{ hostvars['localhost']['ldap_nfs_server'] | default(hostvars['localhost']['slurm_nfs_server'] | default('', true), true) }}:{{ hostvars['localhost']['ldap_nfs_path'] | default('/mnt/share/openldap') }}"
trackfile_nfs_path: "{{ hostvars['localhost']['slurm_nfs_server'] | default('', true) }}:{{ hostvars['localhost']['slurm_nfs_path'] | default('/mnt/share/omnia') }}/track"

# Cloud-Init LDAP defaults to avoid undefined template failures
connection_type: "tls"
ldap_server_ip: ""
ldap_search_base: ""
ldap_default_bind_dn: ""
password: ""

# LDAP Configuration Variables
tls_cert_path: "/etc/openldap/certs/ldapserver.crt"
ldap_conf_dest: "/etc/openldap/ldap.conf"
sasl_nocanon_regxp: "SASL_NOCANON\ton"
sasl_nacanon_replace1: "SASL_NOCANON\ton\nBASE\t{{ hostvars['localhost']['ldap_search_base'] }}"
sasl_nacanon_replace2: "SASL_NOCANON\ton\nURI\tldap://{{ hostvars['localhost']['ldap_server_ip'] }}"
sasl_nacanon_replace3: "SASL_NOCANON\ton\nTLS_CACERT\t{{ tls_cert_path }}"
sasl_nacanon_replace4: "SASL_NOCANON\ton\nURI\tldap://{{ hostvars['localhost']['ldap_server_ip'] }}:636"
file_mode: "0644"
ldap_starttls_port: 389
ldap_ssl_port: 636

# Slurm Configuration Variables
home_dir: /var/lib/slurm
user: slurm
munge_user: munge
munge_group: munge
mysql_user: mysql
mysql_group: mysql
file_mode_400: "0400"
file_mode_755: "0755"
file_mode_600: "0600"
ip_timeout: 10
ip_wait_loop: 60

# Additional paths
default_file_path: "{{ playbook_dir }}/roles/slurm_config/defaults/main.yml"
ssh_private_key_path: /root/.ssh/oim_rsa

# Slurm controller list default
ctld_list: "{{ hostvars['localhost']['ctld_list'] | default([]) }}"

# IP Name Mapping for Cloud-Init
ip_name_map: "{{ hostvars['localhost']['read_mapping_file']['dict'] | default({}) }}"
