---

- name: Load storage_config for NFS parameters (localhost)
  ansible.builtin.include_vars:
    file: "{{ hostvars['localhost']['input_project_dir'] }}/storage_config.yml"
  delegate_to: localhost
  run_once: true

- name: Derive slurm NFS facts from storage_config when not set
  ansible.builtin.set_fact:
    slurm_nfs_server: "{{ (hostvars['localhost']['nfs_client_params'] | selectattr('nfs_name', 'equalto', hostvars['localhost']['slurm_cluster'][0].nfs_storage_name) | first).server_ip }}"
    slurm_nfs_path: "{{ (hostvars['localhost']['nfs_client_params'] | selectattr('nfs_name', 'equalto', hostvars['localhost']['slurm_cluster'][0].nfs_storage_name) | first).server_share_path }}"
  delegate_to: localhost
  delegate_facts: true
  run_once: true
  when:
    - hostvars['localhost']['slurm_nfs_server'] | default('') | string == ''
    - hostvars['localhost']['slurm_cluster'] is defined
    - hostvars['localhost']['nfs_client_params'] is defined

- name: Derive k8s facts (nfs, crio, pulp, admin) on localhost
  ansible.builtin.set_fact:
    k8s_nfs_name: "{{ (hostvars['localhost']['service_k8s_cluster'] | default([{}]))[0].nfs_storage_name | default('nfs_k8s') }}"
    k8s_nfs_entry: "{{ hostvars['localhost']['nfs_client_params'] | selectattr('nfs_name', 'equalto', (hostvars['localhost']['service_k8s_cluster'] | default([{}]))[0].nfs_storage_name | default('nfs_k8s')) | list | first | default({}) }}"
    k8s_nfs_server_ip: "{{ (hostvars['localhost']['nfs_client_params'] | selectattr('nfs_name', 'equalto', (hostvars['localhost']['service_k8s_cluster'] | default([{}]))[0].nfs_storage_name | default('nfs_k8s')) | first).server_ip | default('') }}"
    k8s_server_share_path: "{{ (hostvars['localhost']['nfs_client_params'] | selectattr('nfs_name', 'equalto', (hostvars['localhost']['service_k8s_cluster'] | default([{}]))[0].nfs_storage_name | default('nfs_k8s')) | first).server_share_path | default('') }}"
    k8s_client_mount_path: "{{ (hostvars['localhost']['nfs_client_params'] | selectattr('nfs_name', 'equalto', (hostvars['localhost']['service_k8s_cluster'] | default([{}]))[0].nfs_storage_name | default('nfs_k8s')) | first).client_share_path | default('') }}"
    k8s_crio_storage_size: "{{ (hostvars['localhost']['service_k8s_cluster'] | default([{}]))[0].k8s_crio_storage_size | default('20G') }}"
    admin_nic_ip: "{{ hostvars['localhost']['admin_nic_ip'] | default('') }}"
    admin_netmask_bits: "{{ hostvars['localhost']['admin_netmask_bits'] | default('') }}"
    admin_nic_cidr: "{{ (hostvars['localhost']['admin_nic_ip'] | default('') ~ '/' ~ hostvars['localhost']['admin_netmask_bits'] | default('')) | ansible.utils.ipaddr('network/prefix') if (hostvars['localhost']['admin_nic_ip'] is defined and hostvars['localhost']['admin_netmask_bits'] is defined and hostvars['localhost']['admin_nic_ip']|string != '' and hostvars['localhost']['admin_netmask_bits']|string != '') else '' }}"
    pulp_mirror: "{{ hostvars['localhost']['admin_nic_ip'] | default('') }}:2225"
  delegate_to: localhost
  delegate_facts: true
  run_once: true
  when:
    - hostvars['localhost']['nfs_client_params'] is defined

- name: Propagate k8s NFS facts to all hosts
  ansible.builtin.set_fact:
    k8s_nfs_server_ip: "{{ hostvars['localhost']['k8s_nfs_server_ip'] | default('') }}"
    k8s_server_share_path: "{{ hostvars['localhost']['k8s_server_share_path'] | default('') }}"
    k8s_client_mount_path: "{{ hostvars['localhost']['k8s_client_mount_path'] | default('') }}"
    k8s_crio_storage_size: "{{ hostvars['localhost']['k8s_crio_storage_size'] | default('20G') }}"
    pulp_mirror: "{{ hostvars['localhost']['pulp_mirror'] | default('') }}"
    admin_nic_ip: "{{ hostvars['localhost']['admin_nic_ip'] | default('') }}"
    admin_netmask_bits: "{{ hostvars['localhost']['admin_netmask_bits'] | default('') }}"
    admin_nic_cidr: "{{ hostvars['localhost']['admin_nic_cidr'] | default('') }}"
  delegate_to: "{{ host_item }}"
  delegate_facts: true
  run_once: true
  loop: "{{ ansible_play_hosts_all | default(ansible_play_hosts) }}"
  loop_control:
    loop_var: host_item
  when:
    - hostvars['localhost']['k8s_nfs_server_ip'] | default('') | string != ''
    - hostvars['localhost']['k8s_server_share_path'] | default('') | string != ''

- name: Fail if k8s NFS server/path are unset or nfs_name not found
  ansible.builtin.fail:
    msg: >-
      k8s NFS details are not defined. Ensure storage_config contains nfs_name '{{ hostvars['localhost']['k8s_nfs_name'] | default('nfs_k8s') }}'
      with server_ip/server_share_path/client_share_path.
  when:
    - hostvars['localhost']['k8s_nfs_server_ip'] | default('') | string == ''
      or hostvars['localhost']['k8s_server_share_path'] | default('') | string == ''

- name: Debug k8s NFS facts on localhost
  ansible.builtin.debug:
    msg:
      k8s_nfs_name: "{{ hostvars['localhost']['k8s_nfs_name'] | default('') }}"
      k8s_nfs_entry: "{{ hostvars['localhost']['k8s_nfs_entry'] | default({}) }}"
      k8s_nfs_server_ip: "{{ hostvars['localhost']['k8s_nfs_server_ip'] | default('') }}"
      k8s_server_share_path: "{{ hostvars['localhost']['k8s_server_share_path'] | default('') }}"
      k8s_client_mount_path: "{{ hostvars['localhost']['k8s_client_mount_path'] | default('') }}"
      k8s_crio_storage_size: "{{ hostvars['localhost']['k8s_crio_storage_size'] | default('') }}"
      admin_nic_ip: "{{ hostvars['localhost']['admin_nic_ip'] | default('') }}"
      admin_netmask_bits: "{{ hostvars['localhost']['admin_netmask_bits'] | default('') }}"
      admin_nic_cidr: "{{ hostvars['localhost']['admin_nic_cidr'] | default('') }}"
  run_once: true
  delegate_to: localhost
  when: ansible_verbosity | default(0) | int > 0

- name: Fail if pulp_mirror is unset
  ansible.builtin.fail:
    msg: >-
      pulp_mirror is not defined. Ensure admin_nic_ip is set (from network_spec) so pulp_mirror can be computed as <admin_nic_ip>:2225
      or set pulp_mirror explicitly before rendering cloud-init templates.
  when:
    - hostvars['localhost']['pulp_mirror'] | default('') | string == ''

- name: Fail if admin_nic_ip or netmask are unset
  ansible.builtin.fail:
    msg: >-
      admin_nic_ip/admin_netmask_bits are not defined. Ensure network_spec was loaded (prepare_oim/discovery) so admin network facts are available.
  when:
    - hostvars['localhost']['admin_nic_ip'] | default('') | string == ''
      or hostvars['localhost']['admin_netmask_bits'] | default('') | string == ''

- name: Include openchami cloud-init vars
  ansible.builtin.include_vars: "{{ role_path }}/../../../common/vars/openchami_cloud_init_vars.yml"

- name: Include vars from default
  ansible.builtin.include_vars: "{{ default_file_path }}"

- name: Fail if slurm NFS server/path are still unset
  ansible.builtin.fail:
    msg: "slurm_nfs_server/path are not defined; ensure storage_config nfs_name {{ hostvars['localhost']['slurm_cluster'][0].nfs_storage_name }} exists"
  when:
    - hostvars['localhost']['slurm_nfs_server'] | default('') | string == ''
      or hostvars['localhost']['slurm_nfs_path'] | default('') | string == ''

- name: Set cloud-init NFS path from slurm facts
  ansible.builtin.set_fact:
    cloud_init_nfs_path: "{{ hostvars['localhost']['slurm_nfs_server'] }}:{{ hostvars['localhost']['slurm_nfs_path'] }}"

- name: Set the functional_group_name
  ansible.builtin.set_fact:
    functional_group_name: "{{ item }}"

- name: Delete ci group configuration - {{ functional_group_name }}
  ansible.builtin.command: "{{ openchami_cli_path }} {{ openchami_commands.cloud_init_group_delete }} @{{ cloud_init_dir }}/ci-group-{{ functional_group_name }}.yaml"
  changed_when: true
  failed_when: false

- name: Load ci group template
  block:
    - name: Load ci group template - {{ functional_group_name }}
      ansible.builtin.template:
        src: "cloud_init/ci-group-{{ functional_group_name }}.yaml.j2"
        dest: "{{ cloud_init_dir }}/ci-group-{{ functional_group_name }}.yaml"
        mode: "{{ hostvars['localhost']['file_permissions_644'] }}"
  rescue:
    - name: Failed to load ci group template
      ansible.builtin.fail:
        msg: "{{ ci_group_load_fail_msg }}"

- name: Set ci group configuration - {{ functional_group_name }}
  ansible.builtin.command: "{{ openchami_cli_path }} {{ openchami_commands.cloud_init_group_set }} @{{ cloud_init_dir }}/ci-group-{{ functional_group_name }}.yaml"
  changed_when: true

- name: Verify ci group configuration - {{ functional_group_name }}
  ansible.builtin.command: "{{ openchami_cli_path }} {{ openchami_commands.cloud_init_group_get_config }} {{ functional_group_name }}"
  changed_when: false
  register: ci_group_compute_output
  no_log: true

- name: Verify ci group output - {{ functional_group_name }}
  ansible.builtin.debug:
    msg: "{{ ci_group_compute_output.stdout_lines }}"
    verbosity: 2
  no_log: true
