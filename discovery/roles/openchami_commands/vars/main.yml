---

# Canonical OpenChami paths owned by this role
openchami_share_path: /opt/omnia/openchami
openchami_work_dir: "{{ hostvars['localhost']['oim_shared_path'] }}/omnia/openchami/workdir"
telemetry_share_path: "{{ hostvars['localhost']['oim_shared_path'] }}/omnia/telemetry"
nodes_dir: "{{ openchami_work_dir }}/nodes"
groups_dir: "{{ nodes_dir }}"
bmc_group_data_file: "{{ telemetry_share_path }}/bmc_group_data.csv"
openchami_config_vars_path: "{{ openchami_share_path }}/configs_vars.yaml"
openchami_nodes_vars_path: "{{ nodes_dir }}/nodes.yaml"
openchami_hostname_vars_path: "{{ nodes_dir }}/hostname.yaml"
cloud_init_dir: "{{ openchami_work_dir }}/cloud-init"
bss_dir: "{{ openchami_work_dir }}/boot"

# Template locations (centralized under openchami_commands)
openchami_templates_root: "{{ playbook_dir }}/roles/openchami_commands/templates"
openchami_nodes_template: "{{ openchami_templates_root }}/nodes/nodes.yaml.j2"
bmc_group_data_template: "{{ openchami_templates_root }}/nodes/bmc_group_data.csv.j2"
openchami_groups_template: "{{ openchami_templates_root }}/nodes/groups.yaml.j2"
openchami_groups_common_template: "{{ openchami_templates_root }}/nodes/groups_common.yaml.j2"
openchami_hostname_template: "{{ openchami_templates_root }}/nodes/hostname.yaml.j2"
apptainer_mirror_template: "{{ openchami_templates_root }}/nodes/apptainer_mirror.conf.j2"
bss_template: "{{ openchami_templates_root }}/bss/bss.yaml.j2"

# Cloud-init/BSS defaults shared across command tasks
bss_params_cloud_init: 'ds=nocloud;s=http://{{ cluster_boot_ip }}:8081/cloud-init/'
bss_params_opts: 'ip=dhcp rd.live.image rd.live.ram rd.neednet=1 rd.driver.blacklist=ccp,edac_core,power_meter,ahci,megaraid_sas modprobe.blacklist=ccp,edac_core,power_meter,ahci,megaraid_sas libata.force=1:disable,2:disable,3:disable,4:disable rd.luks=0 rd.md=0 rd.dm=0 console=tty0 console=ttyS0,115200 selinux=0 apparmor=0 ip6=off cloud-init=enabled'
ci_defaults_template: "{{ playbook_dir }}/roles/openchami_cloud_init/templates/ci-defaults.yaml.j2"
ci_defaults_dest: "{{ cloud_init_dir }}/ci-defaults.yaml"
ci_group_common_template: "{{ playbook_dir }}/roles/openchami_cloud_init/templates/ci-group-common.yaml.j2"
ci_group_common_dest: "{{ cloud_init_dir }}/ci-group-common.yaml"
ci_group_load_fail_msg: |
  "Template loading failed. Ensure the template exists in the specified path and is compatible with the defined functional groups."
image_missing_fail_msg: "Failed to set kernel or initrd. Create the image using build_image.yml and try again."
ssh_key_path: /root/.ssh/oim_rsa.pub
ssh_private_key_path: /root/.ssh/oim_rsa
default_file_path: "{{ playbook_dir }}/roles/slurm_config/defaults/main.yml"

# Messaging
discover_fail_msg: "Failed to discover nodes. Please verify the inputs provided in mapping file."

# OpenChami Commands Dictionary
# Centralized command definitions for SMD, BSS, Cloud-Init, and Discovery operations
openchami_commands:
  # SMD Component Endpoint Operations
  smd_compep_delete_all: "smd compep delete --no-confirm --all"

  # SMD Redfish Endpoint Operations
  smd_rfe_delete_all: "smd rfe delete --no-confirm --all"

  # SMD Interface Operations
  smd_iface_delete_all: "smd iface delete --no-confirm --all"

  # SMD Node Discovery
  smd_discover_static: "discover static -f yaml -d"
  discover_static_yaml: "discover static -f yaml -d"

  # SMD Component Get (verify nodes created)
  smd_component_get: "smd component get"
  smd_component_get_nodes: "smd component get | jq '.Components[] | select(.Type == \"Node\")'"

  # SMD Group Operations
  smd_group_get: "smd group get"
  smd_group_delete: "smd group delete --no-confirm"
  smd_group_add_yaml: "smd group add -f yaml -d"
  smd_group_add_members: "smd group add -m"

  # BSS Boot Parameters Operations
  bss_boot_params_delete: "bss boot params delete --no-confirm -d"
  bss_boot_params_set: "bss boot params set -f yaml -d"
  bss_boot_params_get: "bss boot params get -F yaml"

  # Cloud-Init Defaults Operations
  cloud_init_defaults_set: "cloud-init defaults set -f yaml -d"
  cloud_init_defaults_get: "cloud-init defaults get -F json-pretty"

  # Cloud-Init Group Operations
  cloud_init_group_delete: "cloud-init group delete --no-confirm -f yaml -d"
  cloud_init_group_set: "cloud-init group set -f yaml -d"
  cloud_init_group_get_config: "cloud-init group get config"

  # Cloud-Init Node Operations
  cloud_init_node_set: "cloud-init node set -f yaml -d"
  cloud_init_node_set_yaml: "cloud-init node set -f yaml -d"
